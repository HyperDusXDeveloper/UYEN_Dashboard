<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UYEN</title>
    <link rel="stylesheet" href="styles.css">
    <!-- นำเข้า Font 'Inter' และ 'Montserrat' จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- ส่วนของโลโก้ -->
            <div class="logo-section">
                <img src="Item/Group%20466.png" alt="UYEN Logo" class="logo-img">
                <div class="subtitle">
                    <span class="line"></span>
                    <span class="subtitle-text">FOR EMPLOYEE</span>
                    <span class="line"></span>
                </div>
            </div>

            <!-- ส่วนของแบบฟอร์ม -->
            <form class="form">
                <div class="input-group">
                    <label>USERNAME</label>
                    <input type="text" placeholder="">
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="" id="login-pwd">
                        <span class="show-text" onclick="togglePassword('login-pwd', this)">SHOW</span>
                    </div>
                </div>

                <button type="button" class="btn-primary" onclick="window.location.href='dashboard.html'">LOGIN</button>
            </form>

            <!-- เส้นคั่นที่ปรากฎในหน้า Login -->
            <hr class="divider">

            <!-- ลิงก์สำหรับไปหน้าสมัครสมาชิก -->
            <div class="footer-link">
                <p>Not on Account? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </div>

    <!-- สคริปต์สั้นๆ สำหรับระบบโชว์/ซ่อนรหัสผ่าน -->
    <script>
        function togglePassword(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                el.innerText = 'HIDE';
            } else {
                input.type = 'password';
                el.innerText = 'SHOW';
            }
        }
    </script>
</body>

</html>
