<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - UYEN</title>
    <link rel="stylesheet" href="styles.css">
    <!-- นำเข้า Font 'Inter' และ 'Montserrat' จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- ส่วนของโลโก้ -->
            <div class="logo-section">
                <img src="Item/Group%20466.png" alt="UYEN Logo" class="logo-img">
                <div class="subtitle">
                    <span class="line"></span>
                    <span class="subtitle-text">FOR EMPLOYEE</span>
                    <span class="line"></span>
                </div>
            </div>

            <!-- ส่วนของแบบฟอร์มสมัครสมาชิก -->
            <form class="form">
                <div class="input-group">
                    <label>USERNAME</label>
                    <input type="text" placeholder="" id="signup-username" maxlength="50" oninput="validateUsername(this)">
                </div>

                <div class="input-group">
                    <label>EMAIL</label>
                    <input type="text" placeholder="example@email.com" autocomplete="off" maxlength="100" oninput="validateEmail(this)">
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="" id="signup-pwd" autocomplete="off" maxlength="100" minlength="5" oninput="validatePassword(this)">
                        <span class="show-text" onclick="togglePassword('signup-pwd', this)">SHOW</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>CONFIRM PASSWORD</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="" id="signup-confirm" autocomplete="off" maxlength="100" minlength="5" oninput="validatePassword(this)">
                        <span class="show-text" onclick="togglePassword('signup-confirm', this)">SHOW</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>PHONE NO.</label>
                    <input type="tel" placeholder="000 - 000 - 0000" maxlength="16" oninput="formatPhoneNumber(this)">
                </div>

                <div class="input-group">
                    <label class="normal-case-label">Role</label>
                    <div class="select-wrapper">
                        <!-- ส่วนของระบบเลือกบทบาท: เลือกได้แค่พนักงานกับเจ้าของร้าน -->
                        <select required>
                            <option value="" disabled selected hidden>เลือกตำแหน่งงาน</option>
                            <option value="พนักงาน">พนักงาน</option>
                            <option value="เจ้าของร้าน">เจ้าของร้าน</option>
                        </select>
                    </div>
                </div>

                <!-- ปรับปุ่มให้มีระยะห่างด้านบนมากขึ้นตามดีไซน์รูปที่ 2 -->
                <button type="button" class="btn-primary" style="margin-top: 15px;">SIGN UP NOW</button>
            </form>

            <!-- ลิงก์กลับไปหน้า Login -->
            <div class="footer-link">
                <p>Have Account ? <a href="index.html">Login Here</a></p>
            </div>
        </div>
    </div>

    <!-- สคริปต์สั้นๆ สำหรับระบบโชว์/ซ่อนรหัสผ่าน -->
    <script>
        function togglePassword(inputId, el) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                el.innerText = 'HIDE';
            } else {
                input.type = 'password';
                el.innerText = 'SHOW';
            }
        }

        function formatPhoneNumber(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 0 && value[0] !== '0') {
                value = '';
            }
            if (value.length > 10) {
                value = value.substring(0, 10);
            }
            let formatted = '';
            if (value.length > 0) formatted += value.substring(0, 3);
            if (value.length > 3) formatted += ' - ' + value.substring(3, 6);
            if (value.length > 6) formatted += ' - ' + value.substring(6, 10);
            input.value = formatted;
        }

        function validatePassword(input) {
            let value = input.value.replace(/[^a-zA-Z0-9@#$%&*®™©฿€¥+\-×÷=≠≤≥_ ().,"']/g, '');
            if (value.length > 100) {
                value = value.substring(0, 100);
            }
            input.value = value;
        }

        function validateEmail(input) {
            let value = input.value;
            
            value = value.replace(/[^a-zA-Z0-9\.@\-_]/g, '');
            
            const firstAt = value.indexOf('@');
            if (firstAt !== -1) {
                const beforeAt = value.substring(0, firstAt + 1);
                const afterAt = value.substring(firstAt + 1).replace(/@/g, '');
                value = beforeAt + afterAt;
            }

            value = value.replace(/\.{2,}/g, '.');
            value = value.replace(/^\./, '');
            value = value.replace(/\.@/g, '@');

            if (value.length > 100) {
                value = value.substring(0, 100);
            }

            input.value = value;
        }

        function validateUsername(input) {
            let value = input.value.replace(/[^a-zA-Z0-9]/g, '');
            if (value.length > 50) {
                value = value.substring(0, 50);
            }
            input.value = value;
        }
    </script>
</body>

</html>
